<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Use Cases — Arabic Algebra Engine</title>
  <link rel="stylesheet" href="./src/styles.css">
  <style>
    .uc-card {
      background: var(--bg2); border: 1px solid rgba(212,168,83,.1);
      border-radius: var(--radius); padding: 28px; margin-bottom: 24px;
      transition: border-color .2s;
    }
    .uc-card:hover { border-color: var(--gold); }
    .uc-card h2 { font-size: 1.2rem; color: var(--gold); margin-bottom: 4px; }
    .uc-card .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .72rem; font-weight: 600; margin-right: 6px; margin-bottom: 10px; }
    .uc-card .tag.iot { background: rgba(78,220,111,.12); color: var(--green); }
    .uc-card .tag.health { background: rgba(231,76,94,.1); color: var(--red); }
    .uc-card .tag.finance { background: rgba(91,141,239,.12); color: var(--blue); }
    .uc-card .tag.edu { background: rgba(196,78,207,.1); color: var(--magenta); }
    .uc-card .tag.infra { background: rgba(240,160,64,.12); color: var(--orange); }
    .uc-desc { color: var(--text-dim); font-size: .92rem; line-height: 1.6; margin-bottom: 16px; }
    .uc-demo { background: var(--bg); border-radius: 8px; padding: 16px; margin-top: 12px; }
    .uc-demo h4 { font-size: .78rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .uc-tryit { margin-top: 14px; }
    .uc-tryit input {
      width: 100%; padding: 10px 14px; background: var(--bg3); color: var(--text);
      border: 1px solid rgba(255,255,255,.08); border-radius: 6px; font: inherit; font-size: .88rem;
    }
    .uc-tryit input:focus { outline: none; border-color: var(--gold); }
    .uc-tryit input::placeholder { color: var(--text-dim); }
    .metric-row { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; }
    .metric { text-align: center; }
    .metric .val { font-size: 1.3rem; font-weight: 700; }
    .metric .lbl { font-size: .72rem; color: var(--text-dim); }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="app">
    <nav class="topnav" id="nav"></nav>
    <div class="page-header">
      <h1>Concrete Use Cases</h1>
      <div class="subtitle">Where a zero-parameter symbolic engine beats billion-parameter LLMs — try each one live.</div>
    </div>

    <div id="usecases"></div>

    <footer style="text-align:center;padding:40px 0 10px;color:var(--text-dim);font-size:.78rem;">
      Every demo runs in your browser. No API. No server. No cost.
    </footer>
  </div>
  <script type="module" src="./src/usecases.ts"></script>
</body>
</html>
